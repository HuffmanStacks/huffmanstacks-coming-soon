<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HuffmanStacks — Quiet precision.</title>
<meta name="description" content="HuffmanStacks — financial-systems craftsmanship: bookkeeping, tax intelligence, and the tools that turn complexity into clear, defensible answers. The full site opens soon.">
<meta name="robots" content="index, follow">
<meta name="theme-color" content="#0a0908">
<link rel="canonical" href="https://huffmanstacks.com/">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta property="og:type" content="website">
<meta property="og:title" content="HuffmanStacks — Quiet precision.">
<meta property="og:description" content="Financial-systems craftsmanship — bookkeeping, tax intelligence, and tools that make complexity clear. The full site opens soon.">
<meta property="og:site_name" content="HuffmanStacks">
<meta property="og:image" content="https://huffmanstacks.com/images/landing-hero.png">
<meta property="og:image:width" content="1594">
<meta property="og:image:height" content="986">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#080706;overflow:hidden;font-family:Georgia,serif}

  /* full-viewport stage */
  .hero{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:#080706;
  }

  /* soft blurred fill of the SAME artwork so any leftover space on a given
     monitor reads as an intentional, premium backdrop — never black bars,
     never a crop of the real composition. */
  .hero::before{
    content:""; position:absolute; inset:0;
    background:url(/images/landing-hero.png) center / cover no-repeat;
    filter:blur(46px) brightness(.5) saturate(1.05);
    transform:scale(1.12);
    z-index:0;
  }
  /* a touch of darkening so the sharp art in front stands out */
  .hero::after{
    content:""; position:absolute; inset:0;
    background:radial-gradient(120% 120% at 50% 50%, transparent 40%, rgba(5,4,3,.55) 100%);
    z-index:1;
  }

  /* the EXACT artwork, always shown whole (contain), as large as the screen
     allows — scales to any resolution with zero cropping. */
  .frame{position:relative; z-index:2; line-height:0;
    filter:drop-shadow(0 18px 60px rgba(0,0,0,.6));}
  .frame img{
    display:block;
    max-width:100vw; max-width:100svw;
    max-height:100vh; max-height:100svh;
    width:auto; height:auto;
    user-select:none; -webkit-user-drag:none;
  }

  /* invisible clickable region over the "INQUIRIES · CHRIS@HUFFMANSTACK.COM" line */
  .frame a.mail{position:absolute; left:40%; top:72.5%; width:21%; height:5.2%; z-index:3}

  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
</style>
</head>
<body>
  <main class="hero">
    <h1 class="sr">HuffmanStacks — Quiet precision.</h1>
    <p class="sr">Financial-systems craftsmanship — bookkeeping, tax intelligence, and the tools that turn complexity into clear, defensible answers. The full site opens soon. Something refined is on the way. Inquiries: Chris@HuffmanStack.com</p>
    <div class="frame">
      <img src="/images/landing-hero.png"
           alt="HuffmanStacks — financial-systems craftsmanship: bookkeeping, tax intelligence, and the tools that turn complexity into clear, defensible answers. The full site opens soon. Something refined is on the way. Quiet precision. Inquiries: Chris@HuffmanStack.com"
           width="1594" height="986" fetchpriority="high" decoding="async">
      <a class="mail" href="mailto:Chris@HuffmanStack.com" aria-label="Email Chris at HuffmanStack dot com"></a>
    </div>
  </main>
</body>
</html>
