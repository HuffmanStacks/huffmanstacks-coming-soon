<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:#080605;overflow:hidden;font-family:Georgia,serif}
  .hero{position:fixed; inset:0}
  /* 16:9 artwork (your exact composition + matched dark extension) filling the
     viewport edge-to-edge. The composition sits inside a dark margin buffer, so
     cover fills any landscape screen without ever cropping the artwork. */
  .hero img{
    width:100%; height:100%;
    object-fit:cover; object-position:center;
    display:block; user-select:none; -webkit-user-drag:none;
  }
  /* very narrow / portrait screens: show the whole artwork (no side-crop) */
  @media (max-aspect-ratio:5/4){
    .hero img{object-fit:contain}
  }
  /* invisible clickable region over the inquiries email line */
  .hero a.mail{position:absolute; left:41%; top:71%; width:18%; height:5.4%; z-index:2}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
</style>
</head>
<body>
  <main class="hero">
    <h1 class="sr">HuffmanStacks — Quiet precision.</h1>
    <p class="sr">Financial-systems craftsmanship — bookkeeping, tax intelligence, and the tools that turn complexity into clear, defensible answers. The full site opens soon. Something refined is on the way. Inquiries: Chris@HuffmanStack.com</p>
    <img src="/images/landing-hero-wide.png"
         alt="HuffmanStacks — financial-systems craftsmanship: bookkeeping, tax intelligence, and the tools that turn complexity into clear, defensible answers. The full site opens soon. Something refined is on the way. Quiet precision. Inquiries: Chris@HuffmanStack.com"
         width="1920" height="1080" fetchpriority="high" decoding="async">
    <a class="mail" href="mailto:Chris@HuffmanStack.com" aria-label="Email Chris at HuffmanStack dot com"></a>
  </main>
</body>
</html>
